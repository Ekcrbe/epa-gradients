# Configuration for the EPA-gradients offline data pipeline.
# Read with Python's stdlib tomllib (no extra dependency).

[data]
# Historical EPA (<= 2024) comes from a pinned commit of the statbotics-csvs repo.
csv_commit = "02113df5bc7c66655fd0496ead62ad4fc5212283"
csv_url = "https://raw.githubusercontent.com/avgupta456/statbotics-csvs/{commit}/v3/team_years.csv"
# 2024-2026 come live from the Statbotics mirror, then are cached. The pinned
# CSV's 2024 is incomplete (mid-season, compressed EPAs), so 2024 is taken from
# the API's now-final values instead of the CSV.
api_base = "https://api-statbotics.iterativerefinement.com/v3"
api_years = [2024, 2025, 2026]
api_page_size = 1000
# Earliest CSV year to retain. The 2008 postseason needs the 2005-2008 window.
csv_min_year = 2005
csv_max_year = 2023

[model]
# Snapshots are labeled by POSTSEASON year Y: the competitive state after season
# Y, from the WMA of the 4 most recent completed seasons up to and including Y.
snapshot_start = 2008
snapshot_end = 2026          # 2026 postseason = current view (window 2023-2026)
skip_years = [2020, 2021]    # canceled: no snapshot, and dropped from every window
# Linear-recency weights over the window [Y-3, Y-2, Y-1, Y]: anchor year Y gets 4,
# Y-1 gets 3, ... with skipped years dropped and remaining weights renormalized.
# A region's team set for postseason Y is the teams that competed in Y (the most
# recent window season); their strength is the WMA over the window.
wma_weights = [4, 3, 2, 1]

[regions]
sc_pch_years = [2023, 2024]  # South Carolina competed in pch these seasons
# South Carolina's own district (called "fsc"/FIRST South Carolina externally)
# began this season; both eras of SC's own-region years merge into "st_sc"
# since they never overlap with sc_pch_years (see regions.sc_region_for_year).
sc_fsc_from = 2025
pa_active_cutoff = 2012      # PA teams active in/after this year use given district

[metrics]
fine_grid = 199              # hero D(p) resolution over the open interval (0,1)
coarse_bins = 40             # heatmap / small-multiples percentile bins
bootstrap_B = 1000
bootstrap_seed = 12345
ci_low = 2.5
ci_high = 97.5
# Regions with fewer than this many teams get a point estimate but no bootstrap
# band (a 1-2 team resample is degenerate and would look falsely certain).
min_band_n = 5
# A crossover is only reported when the region is meaningfully easier somewhere
# AND harder somewhere (|D| reaches this on both sides); otherwise it is
# near-monotone and crossover is null. Avoids spurious crossings from tiny blips.
crossover_min_side = 0.02
# Crossovers in the bottom decile are not reported: sub-10th-percentile
# performance is noisy year-over-year and a flip there is not a notable fact.
crossover_min_p = 0.10
# Survival ratio R(x) is only reported where the global tail is thick enough.
survival_min_global_frac = 0.01
survival_min_global_teams = 5

[emit]
docs_data = "docs/data"
